name: Run pipeline + upload to Supabase

on:
  schedule:
    # Cada lunes a las 03:00 UTC (~05:00 Madrid). Ajustable.
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      from_stage:
        description: "Etapa inicial (extraccion, transformacion, geocodificacion, analisis, supabase)"
        required: false
        default: "extraccion"
      to_stage:
        description: "Etapa final"
        required: false
        default: "supabase"
      skip_supabase:
        description: "No subir a Supabase (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SCHEMA: recursos
      SUPABASE_TABLE: entidades
      MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
      MAPA_RECURSOS_UA: "MapaRecursosObservatorio/2.0 (investigacion@odesocan.org)"
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias del sistema (geo + pdf)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libxml2-dev libssl-dev libcurl4-openssl-dev \
            poppler-utils libpoppler-cpp-dev libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pdftools
            any::tidyverse
            any::readr
            any::writexl
            any::jsonlite
            any::sf
            any::httr2
            any::digest
            any::glue
            any::cli
            any::tidyr
            any::purrr
            any::yaml
            any::stringi

      - name: Restaurar cache de geocoding
        uses: actions/cache@v4
        with:
          path: cache/
          key: geocoding-cache-${{ github.run_id }}
          restore-keys: |
            geocoding-cache-

      - name: Ejecutar pipeline
        run: |
          ARGS="--from ${{ github.event.inputs.from_stage || 'extraccion' }} --to ${{ github.event.inputs.to_stage || 'supabase' }}"
          if [ "${{ github.event.inputs.skip_supabase }}" = "true" ]; then
            ARGS="$ARGS --skip-supabase"
          fi
          Rscript scripts/run_pipeline.R $ARGS

      - name: Commit del JSON de la web si cambio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/recursos.json
          if git diff --staged --quiet; then
            echo "Sin cambios en web/data/recursos.json"
          else
            git commit -m "data: actualizar web/data/recursos.json"
            git push
          fi

      - name: Guardar logs y salidas como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            salidas/
            logs/
          if-no-files-found: ignore
          retention-days: 30
